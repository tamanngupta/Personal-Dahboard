<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tamanna's Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,600;1,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #07080d;
    --concrete: #0f1015;
    --concrete-edge: #1c1f28;
    --text: #c8c2b4;
    --text-dim: #4a4840;
    --amber: #e8943a;
    --teal: #4ecdc4;
    --red: #c94040;
    --green: #6a9e5e;
    --blue: #5b8fa8;
    --yellow: #d4b84a;
    --purple: #8b6bb1;
    --warm: #c47e3a;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    overflow-x: hidden;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 2rem 1rem 4rem;
  }

  .sky { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
  .star {
    position: absolute; border-radius: 50%; background: white; opacity: 0;
    animation: twinkle var(--d, 3s) ease-in-out infinite var(--delay, 0s);
  }
  @keyframes twinkle { 0%,100%{opacity:0} 50%{opacity:var(--max-op,0.6)} }

  .header {
    position: relative; z-index: 2; text-align: center;
    margin-bottom: 2.5rem; padding-top: 1rem;
    animation: fadein 0.8s ease forwards;
  }
  .header .greeting {
    font-family: 'Fraunces', serif;
    font-size: clamp(1.8rem, 4vw, 2.6rem);
    font-weight: 600; letter-spacing: 0.02em;
    color: var(--text); margin-bottom: 0.3rem;
  }
  .header .date {
    font-size: 0.72rem; color: var(--text-dim);
    letter-spacing: 0.18em; text-transform: uppercase; margin-bottom: 0.6rem;
  }
  .header .quote {
    font-size: 0.88rem; color: var(--text-dim); font-style: italic;
    max-width: 420px; margin: 0 auto; line-height: 1.6; opacity: 0.75;
  }

  .building-wrap {
    position: relative; z-index: 2; width: 100%; max-width: 780px;
    animation: fadein 1.2s ease forwards;
  }

  .building {
    width: 100%; background: var(--concrete);
    border: 1px solid var(--concrete-edge); border-radius: 2px;
    padding: 2.5rem 2rem 0; position: relative;
  }

  .rooftop {
    position: absolute; top: -18px; left: 10%; right: 10%;
    height: 18px; background: var(--concrete);
    border: 1px solid var(--concrete-edge); border-bottom: none; border-radius: 2px 2px 0 0;
  }
  .rooftop::before {
    content: ''; position: absolute; top: -10px; left: 30%; right: 30%;
    height: 10px; background: var(--concrete);
    border: 1px solid var(--concrete-edge); border-bottom: none;
  }
  .antenna {
    position: absolute; top: -52px; right: 28%;
    width: 2px; height: 34px; background: var(--concrete-edge);
  }
  .antenna::after {
    content: ''; position: absolute; top: 0; left: -7px;
    width: 16px; height: 1px; background: var(--concrete-edge);
  }

  /* FLOOR LAYOUTS */
  .floor {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1.4rem;
    margin-bottom: 1.4rem;
  }
  .floor.two-col {
    /* 2 windows but centered — use auto to keep them same size as 3-col */
    grid-template-columns: repeat(2, 1fr);
    max-width: 66.66%;
    margin-left: auto;
    margin-right: auto;
  }
  .floor.four-col { grid-template-columns: repeat(4, 1fr); }

  .floor-divider { height: 1px; background: var(--concrete-edge); margin: 0 0 1.4rem; }

  /* WINDOW */
  .window {
    position: relative; aspect-ratio: 3/4;
    background: #080a0e; border: 1.5px solid #252830; border-radius: 1px;
    overflow: visible; cursor: pointer; text-decoration: none; display: block;
    transition: border-color 0.4s ease;
  }
  .window-clip { position: absolute; inset: 0; overflow: hidden; border-radius: 1px; }

  .window-aura {
    position: absolute; inset: -30px; border-radius: 4px;
    opacity: 0; transition: opacity 0.5s ease; pointer-events: none; z-index: -1;
    filter: blur(22px);
  }
  .window:hover .window-aura { opacity: 1; }
  .window:hover { border-color: rgba(255,255,255,0.12); }

  .win-frame { position: absolute; inset: 0; z-index: 10; pointer-events: none; }
  .win-frame::before {
    content: ''; position: absolute; inset: 0;
    background:
      linear-gradient(var(--fc) 0 0) center / 1.5px 100% no-repeat,
      linear-gradient(var(--fc) 0 0) center / 100% 1.5px no-repeat;
  }

  .win-label {
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 0.5rem 0.4rem 0.4rem; text-align: center; z-index: 11;
    background: linear-gradient(transparent, rgba(0,0,0,0.75));
  }
  .win-label span {
    font-family: 'DM Sans', sans-serif; font-size: 0.58rem; font-weight: 500;
    letter-spacing: 0.14em; text-transform: uppercase;
    opacity: 0; transition: opacity 0.3s ease; color: rgba(255,255,255,0.8);
  }
  .window:hover .win-label span { opacity: 1; }

  .win-svg { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 2; }

  /* colour configs */
  .w-yellow { --wc: #d4b84a; --fc: #22200e; }
  .w-amber  { --wc: #e8943a; --fc: #2a1e08; }
  .w-teal   { --wc: #4ecdc4; --fc: #162221; }
  .w-red    { --wc: #c94040; --fc: #261414; }
  .w-green  { --wc: #6a9e5e; --fc: #181e16; }
  .w-blue   { --wc: #5b8fa8; --fc: #141c22; }
  .w-warm   { --wc: #c47e3a; --fc: #221a10; }

  .ground {
    height: 14px; background: #09090c; border-top: 1px solid var(--concrete-edge);
    margin: 0 -2rem; display: flex; align-items: center; justify-content: center; gap: 2rem;
  }
  .ground-light {
    width: 4px; height: 4px; border-radius: 50%; opacity: 0.3;
    animation: groundblink 4s ease-in-out infinite;
  }
  .ground-light:nth-child(1) { background: var(--amber); }
  .ground-light:nth-child(2) { background: var(--teal); animation-delay: 1.3s; }
  .ground-light:nth-child(3) { background: var(--amber); animation-delay: 2.6s; }
  @keyframes groundblink { 0%,100%{opacity:0.2} 50%{opacity:0.6} }

  @keyframes fadein { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:none} }

  /* ── SVG HOVER ANIMATIONS ── */
  @keyframes barBounce { 0%,100%{transform:scaleY(1)} 50%{transform:scaleY(1.18)} }
  .w-green:hover .bar1 { animation: barBounce 0.9s ease-in-out infinite; transform-origin: bottom; }
  .w-green:hover .bar2 { animation: barBounce 0.9s 0.15s ease-in-out infinite; transform-origin: bottom; }
  .w-green:hover .bar3 { animation: barBounce 0.9s 0.3s ease-in-out infinite; transform-origin: bottom; }
  .w-green:hover .bar4 { animation: barBounce 0.9s 0.45s ease-in-out infinite; transform-origin: bottom; }
  .w-green:hover .bar5 { animation: barBounce 0.9s 0.6s ease-in-out infinite; transform-origin: bottom; }

  @keyframes wheelSpin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
  .w-teal.health-win:hover .wheel-rear  { animation: wheelSpin 1s linear infinite; transform-origin: 30px 95px; }
  .w-teal.health-win:hover .wheel-front { animation: wheelSpin 1s linear infinite; transform-origin: 70px 95px; }
  @keyframes riderBob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-2px)} }
  .w-teal.health-win:hover .rider { animation: riderBob 0.5s ease-in-out infinite; }

  @keyframes clothSway { 0%,100%{transform:rotate(0deg)} 33%{transform:rotate(4deg)} 66%{transform:rotate(-3deg)} }
  .w-red:hover .cloth1 { animation: clothSway 1.2s ease-in-out infinite; transform-origin: 28px 42px; }
  .w-red:hover .cloth2 { animation: clothSway 1.2s 0.2s ease-in-out infinite; transform-origin: 45px 42px; }
  .w-red:hover .cloth3 { animation: clothSway 1.2s 0.4s ease-in-out infinite; transform-origin: 62px 42px; }

  @keyframes noteWiggle { 0%,100%{transform:rotate(0deg)} 25%{transform:rotate(3deg)} 75%{transform:rotate(-2deg)} }
  .w-teal.opp-win:hover .note1 { animation: noteWiggle 1s ease-in-out infinite; transform-origin: center; }
  .w-teal.opp-win:hover .note2 { animation: noteWiggle 1s 0.2s ease-in-out infinite; transform-origin: center; }
  .w-teal.opp-win:hover .note3 { animation: noteWiggle 1s 0.4s ease-in-out infinite; transform-origin: center; }

  @keyframes bookFlutter { 0%,100%{transform:rotate(0deg)} 50%{transform:rotate(-8deg)} }
  .w-amber.acad-win:hover .book-held { animation: bookFlutter 0.6s ease-in-out infinite; transform-origin: 50px 104px; }
</style>
</head>

<script>
  const greetings = [
    "Rise and grind.",
    "Let's get to work.",
    "Another day, another chance to build your empire.",
    "Time to make some magic happen.",
    "The world won't conquer itself.",
    "Let's turn those dreams into plans.",
    "Ready to build something amazing?",
    "The grind never stops, and neither do you.",
    "Let's make today ridiculously productive.",
    "Your future self will thank you for the work you put in today.",
    "Every day is an opportunity to level up. Let's go.",
    "The only way to do great work is to love what you do. Let's get to it.",
    "Success is not for the lazy. Let's hustle.",
    "Let's build a life that feels good on the inside, not just one that looks good on the outside.",
    "The best way to predict the future is to create it. Let's start building.",
    "Your potential is endless. Let's tap into it.",
  ];

  const quotes = [
    "I lied. I like being the best in the room. I am not humble. I want it more than everyone.",
    "No small goals. No small plans. Extremes are home. Speed is stasis. A normal life is not worth living.",
    "Mastery starts with drowning. Total fucking immersion. No half measures. Let it take over.",
    "Be consumed by your ambition. There is no deeper betrayal than abandoning your own becoming.",
    "How do I stop being scared? You do it scared. The courage arrives with the action, not before it.",
    "It takes a dangerous mind to want more in this world. Stress is fuel. Chaos is fuel.",
    "You honestly gotta believe in yourself so much that it's borderline delusional.",
    "You need goals that give you goosebumps. A mission that makes it impossible to sleep.",
    "My life became 600% better when I started acting like a self-obsessed piece of shit. 10/10 would recommend.",
    "\"That's not realistic.\" Yeah, to you. Chopped, broke, doubtful ass.",
    "I was working weekends, missing parties, investing everything. Execution is evidence.",
    "Be so disciplined it looks like madness.",
    "I'd rather think I'm the shit and be humbled by God than humble myself and never try.",
    "Because I'm crazy enough to think I can.",
    "The entire point of life is to take chances on dreams that seem crazy to most, but feel like destiny to you.",
    "Even at my worst, I'm fucking incredible.",
    "You're not always going to be motivated, so you must be disciplined.",
    "Don't call me lucky. I failed more times than you tried.",
    "Behind my obsession to be better every day is a kid who realised no one was coming to save him.",
    "I feel my sexiest when I do what I said I was gonna do. Discipline and intention is power.",
    "Being insecure is a waste of youth. Nobody is above you.",
    "She was born with something inside her that refuses to settle for average.",
    "Do shit that confuses the normies. Work when people are in bed. You can't fit in. You must stick out.",
    "You're not too much. You were never too much. You're a woman who knows she was made for more.",
    "Idk I just have this crazy faith that everything is going to work out insanely well for me.",
  ];

  function dailyPick(arr) {
    const day = Math.floor(Date.now() / 86400000);
    return arr[day % arr.length];
  }

  document.getElementById('greeting').textContent = dailyPick(greetings);
  document.getElementById('quote').textContent = dailyPick(quotes);

  const d = new Date();
  document.getElementById('datestr').textContent =
    d.toLocaleDateString('en-IN', { weekday:'long', day:'numeric', month:'long', year:'numeric' });

  const sky = document.getElementById('sky');
  for (let i = 0; i < 90; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 1.8 + 0.3;
    s.style.cssText = `
      width:${size}px;height:${size}px;
      top:${Math.random()*100}%;left:${Math.random()*100}%;
      --d:${(Math.random()*4+2).toFixed(1)}s;
      --delay:-${(Math.random()*6).toFixed(1)}s;
      --max-op:${(Math.random()*0.5+0.2).toFixed(2)};
    `;
    sky.appendChild(s);
  }
</script>
